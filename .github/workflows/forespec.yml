name: Forespec PR gate

# Dogfoods this repo's own drop-in action (action.yml, via `uses: ./`): grades the
# checkpoints a PR touches, posts a sticky comment with how each moved vs the last
# run, and feeds the calibration store. Advisory by default (never blocks) — pass
# `fail: "true"` to the action below to make it a required, blocking check.

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write # so the gate can upsert its comment

jobs:
  forespec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so we can diff HEAD against the base branch

      # Persist the calibration store across runs so "vs prev" deltas and passive
      # "flagged -> fixed" capture work. (Actions caches are branch-scoped and can be
      # evicted; a committed branch or external store is sturdier for durable history.)
      - name: Restore calibration store
        uses: actions/cache@v4
        with:
          path: .forespec
          key: forespec-store-${{ github.run_id }}
          restore-keys: |
            forespec-store-

      - name: Forespec gate
        uses: ./
        with:
          base: ${{ github.base_ref }}
          # Optional — set these (repo secret + variable) to use the reasoning
          # verifier. Without them the gate runs the deterministic mock baseline at $0.
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          anthropic-model: ${{ vars.ANTHROPIC_MODEL }}
